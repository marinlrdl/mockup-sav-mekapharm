<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats pièces — Mekapharm SAV (maquette)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="stats_pieces">

<template id="page-content">
  <div class="breadcrumb">Mekapharm SAV <span class="sep">/</span> <a href="index.html">Tableau de bord</a> <span class="sep">/</span> Stats pièces</div>
  <h1 class="page-title">Statistiques de remplacement</h1>
  <p class="page-sub">Historique PIECE_REMPLACEMENT — 12 derniers mois, parc complet</p>

  <div class="grid-2 section-gap">
    <section class="panel">
      <div class="panel-head"><span class="panel-title">Remplacements par catégorie</span><span class="panel-sub">100 interventions pièces / 12 mois</span></div>
      <div style="padding:16px 20px;" id="catChart"></div>
    </section>

    <section class="panel note-host">
      <div class="panel-head"><span class="panel-title">Durée de vie réelle</span><span class="panel-sub">médiane observée</span></div>
      <table class="tbl">
        <thead><tr><th>Pièce</th><th>Médiane</th><th>Min – max</th><th style="text-align:right;">n</th></tr></thead>
        <tbody id="lifeBody"></tbody>
      </table>
      <p class="hint" style="padding:10px 18px 14px;">Ces durées réelles calibrent les seuils d'alerte usure — boucle : remplacement → durée observée → seuil ajusté.</p>
      <span class="note" style="top:-11px; left:10px;">R1.6 — PIECE_REMPLACEMENT (kilométrage/compteurs à la dépose) = calibration des projections</span>
    </section>
  </div>
</template>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderHBars(document.getElementById('catChart'), STATS_PIECES.parCategorie);
  document.getElementById('lifeBody').innerHTML = STATS_PIECES.dureesVies.map(d => `
    <tr><td style="font-weight:600;">${d.piece}</td>
    <td class="mono" style="font-weight:700;">${d.med}</td>
    <td class="mono dim" style="font-size:10.5px;">${d.minmax}</td>
    <td class="mono faint num" style="text-align:right;">${d.n}</td></tr>`).join('');
});
</script>
</body>
</html>
